# Techaegis AI — full stack in one command:  docker compose up
#
# Brings up: Postgres+pgvector, the FastAPI AI/voice service, and the Next.js app
# (with a one-shot migrate+seed). By default the AI service talks to OLLAMA on the
# HOST (host.docker.internal) so it reuses the models you already pulled — no 14GB
# re-download. To run Ollama in a container instead:  docker compose --profile ollama up
# (then set OLLAMA_HOST=http://ollama:11434 in the backend env below).

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: fieldflow
      POSTGRES_PASSWORD: fieldflow
      POSTGRES_DB: fieldflow
    ports:
      - "5433:5432"   # host 5433 to avoid clashing with a local Postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldflow -d fieldflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: push the Prisma schema and seed demo data, then exit.
  migrate:
    build: ./frontend
    command: sh -c "npx prisma db push --skip-generate && npm run db:seed"
    environment:
      DATABASE_URL: postgresql://fieldflow:fieldflow@db:5432/fieldflow?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    restart: unless-stopped   # auto-restart on crash / OOM
    environment:
      DATABASE_URL: postgresql://fieldflow:fieldflow@db:5432/fieldflow
      OLLAMA_HOST: http://host.docker.internal:11434
      JWT_SECRET: change-me-in-production
      CORS_ORIGINS: http://localhost:3000
      APP_URL: http://localhost:3000   # for password-set links in email
      TTS_PROVIDER: auto   # 'say' is macOS-only; in-container voice needs Kokoro files
      # SMS (Twilio) — read from the root .env via Compose interpolation. Blank = SMS off.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach host Ollama on Linux
    # Readiness gate: 503s when the DB is down so dependents wait / LB drains it.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://fieldflow:fieldflow@db:5432/fieldflow?schema=public
      AI_SERVICE_URL: http://backend:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/login',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      backend:
        condition: service_healthy   # wait until the API is actually ready

  # Optional: run Ollama in a container (heavy first-run model download).
  # Enable with:  docker compose --profile ollama up
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pgdata:
  ollama:
